##
## sambil.publivalla.com — Sambil frontend (Next.js standalone detrás de proxy)
## Copiar: /etc/nginx/sites-available/sambil.publivalla.com.conf
## Activar: ln -sf /etc/nginx/sites-available/sambil.publivalla.com.conf /etc/nginx/sites-enabled/
## Recargar: nginx -t && systemctl reload nginx
##
## Node escucha en 127.0.0.1:3010 (systemd sambil-frontend).
##

server {
    listen 80;
    server_name sambil.publivalla.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name sambil.publivalla.com;

    client_max_body_size 25M;

    ssl_certificate /etc/letsencrypt/live/sambil.publivalla.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sambil.publivalla.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }
}
