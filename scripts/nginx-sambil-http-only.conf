# Solo HTTP + ACME (antes del certificado TLS).
# Copiar a /etc/nginx/sites-available/sambil.publivalla.com.conf la primera vez.
# certbot certonly --webroot -w /var/www/letsencrypt -d sambil.publivalla.com

server {
    listen 80;
    server_name sambil.publivalla.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
